<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ARKHE(N) S9 - O Olho da Teknet</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; color: #fff; font-family: 'Courier New', monospace; }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border: 1px solid #333;
            pointer-events: none;
            z-index: 100;
        }
        .label { color: #555; font-size: 12px; text-transform: uppercase; }
        .value { font-size: 24px; font-weight: bold; color: #0ff; margin-bottom: 10px; }
        .status { font-size: 18px; color: #fff; }
    </style>
</head>
<body>
    <div id="hud">
        <div class="label">Permeabilidade Qualica (Q)</div>
        <div id="q-display" class="value">0.000</div>
        <div class="label">Índice S (Sincronicidade)</div>
        <div id="s-display" class="value">0.000</div>
        <div class="label">Pressão Hidráulica (HMT)</div>
        <div id="hmt-pressure" class="value">0.000</div>
        <div class="label">Fluxo Hidráulico</div>
        <div id="hmt-flow" class="status">0.000</div>
        <div class="label">Estado do Loop</div>
        <div id="state-display" class="status">INICIALIZANDO</div>
    </div>
    <div id="container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Arkhe(n) Dashboard</title>
    <style>
        body { margin: 0; background: #020202; color: #00ffcc; font-family: monospace; overflow: hidden; }
        #info { position: absolute; top: 10px; left: 10px; z-index: 100; pointer-events: none; }
        .stat { margin-bottom: 5px; }
    </style>
</head>
<body>
    <div id="info">
        <div class="stat">System: Arkhe(n) Ω.224.φ</div>
        <div class="stat" id="status">Status: Connecting...</div>
        <div class="stat" id="vk">VK: --</div>
        <div class="stat" id="t_kr">t_KR: --</div>
    </div>
    <script type="module" src="main.js"></script>
</body>
</html>
