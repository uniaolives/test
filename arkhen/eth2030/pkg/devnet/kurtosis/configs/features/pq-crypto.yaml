# Post-Quantum Crypto — NTT (EIP-7885), NII field arithmetic, BLS12-381 suite, PQ attestations
# Forks: Glamsterdam (BLS), Hogota, I+ (NTT 0x15 + NII 0x0201-0x0204)
# Verify: ecrecover, BLS G1/G2/Pairing/MapFp2ToG2, NTT BN254+Goldilocks fwd+inv, NII ModExp/FieldMul/FieldInv/BatchVerify, PQ tx rejection
participants:
  - el_type: geth
    el_image: eth2030:local
    el_log_level: debug
    el_extra_params:
      - "--override.iplus=0"
    cl_type: lighthouse
    cl_image: sigp/lighthouse:latest
    count: 2

network_params:
  network: kurtosis
  seconds_per_slot: 2
  genesis_delay: 10

additional_services:
  - dora
  - spamoor
  - assertoor

spamoor_params:
  spammers:
    - scenario: eoatx
      name: "PQ TX Load"
      config:
        throughput: 50
        max_pending: 100
        max_wallets: 50

assertoor_params:
  run_stability_check: true
