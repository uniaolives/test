# BAL Retention — IsBALRetained retention window (SPEC-5.5 / EIP-7928)
# BALRetentionSlots = 3533 epochs × 32 slots = 113056 slots.
# Tests: all blocks within the retention window are accessible via RPC.
#        engine_getPayloadBodiesByHashV2 / ByRangeV2 respect retention window.
# Verify: blocks 1..N accessible, no retention errors in logs.
participants:
  - el_type: geth
    el_image: eth2030:local
    cl_type: lighthouse
    cl_image: sigp/lighthouse:latest
    count: 2

network_params:
  network: kurtosis
  seconds_per_slot: 2
  genesis_delay: 10

additional_services:
  - dora
  - spamoor
  - assertoor

spamoor_params:
  spammers:
    - scenario: eoatx
      name: "BAL Retention Load"
      config:
        throughput: 50
        max_pending: 100
        max_wallets: 50

assertoor_params:
  run_stability_check: true
