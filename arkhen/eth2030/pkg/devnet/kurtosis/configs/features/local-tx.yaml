# EP-6 LocalTx Gate — BB-2.2: type-0x08 AllowLocalTx flag and gas discount
# Tests: type-0x08 txs rejected by default, regular txs unaffected, gas price
#        oracle active, chain advances normally with the flag disabled.
participants:
  - el_type: geth
    el_image: eth2030:local
    cl_type: lighthouse
    cl_image: sigp/lighthouse:latest
    count: 2

network_params:
  network: kurtosis
  seconds_per_slot: 2
  genesis_delay: 10

additional_services:
  - dora
  - spamoor
  - assertoor

spamoor_params:
  spammers:
    - scenario: eoatx
      name: "EP-6 LocalTx Load"
      config:
        throughput: 50
        max_pending: 100
        max_wallets: 50

assertoor_params:
  run_stability_check: true
