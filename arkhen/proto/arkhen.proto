syntax = "proto3";
// DEPRECATED: This service is being replaced by Conjure-based HandoverService.
// See arkhe-api/src/main/conjure/arkhe-handover.yml
package arkhen;

service ArkhenService {
    rpc StreamHandover(Handover) returns (HandoverStatus);
}

message Handover {
    uint64 id = 1;
}

message HandoverStatus {
    bool success = 1;
}
