apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: arkhe-orb-emitter-hpa
  namespace: arkhe-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: arkhe-orb-emitter
  minReplicas: 3
  maxReplicas: 100
  metrics:
    - type: Pods
      pods:
        metric:
          name: arkhe_coherence_global
        target:
          type: AverageValue
          averageValue: "0.85"
