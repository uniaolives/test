[package]
name = "openclaw_arkhe"
version = "0.1.0"
edition = "2021"

[dependencies]
arkhe-quantum = { path = "../../arkhe-linux/core/arkhe-quantum" }
nalgebra = { version = "0.32", features = ["serde-serialize"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
anyhow = "1.0"
thiserror = "1.0"
log = "0.4"
