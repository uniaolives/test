apiVersion: apps/v1
kind: Deployment
metadata:
  name: arkhe-mcp-server
  namespace: arkhe-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: arkhe-mcp
  template:
    metadata:
      labels:
        app: arkhe-mcp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: mcp-server
          image: arkhe/arkhe-mcp-server:v1.0.0
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: arkhe-mcp-config
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
