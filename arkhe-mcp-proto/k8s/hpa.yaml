apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: arkhe-mcp-hpa
  namespace: arkhe-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: arkhe-mcp-server
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
