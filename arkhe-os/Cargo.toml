[package]
name = "arkhe-os"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
chrono = "0.4"
anyhow = "1.0"
thiserror = "1.0"
log = "0.4"
env_logger = "0.10"
nom = "7.1"
arkhe-db = { path = "../arkhe-db" }
tokio = { version = "1", features = ["full"] }
libp2p = { version = "0.53", features = ["tcp", "dns", "tokio", "noise", "yamux", "gossipsub", "mdns", "macros"] }
futures = "0.3"
reqwest = { version = "0.11", features = ["json"] }
rand = "0.8"

[dev-dependencies]

[dev-dependencies]
rand = "0.8"
