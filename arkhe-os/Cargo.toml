[package]
name = "arkhe-os"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"
nom = "7.1"
thiserror = "1.0"
log = "0.4"
env_logger = "0.10"
tokio = { version = "1.0", features = ["full"] }
warp = "0.3"
futures-util = "0.3"
reqwest = { version = "0.11", features = ["json"] }
bincode = "1.3.3"
rocksdb = "0.21.0"
rand = "0.8"
sha3 = "0.10"

[dev-dependencies]
