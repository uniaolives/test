[package]
name = "arkhe-os"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"
nom = "7.1"
thiserror = "1.0"
log = "0.4"
env_logger = "0.10"
tokio = { version = "1", features = ["full"] }
warp = "0.3"
futures-util = "0.3"
reqwest = { version = "0.11", features = ["json"] }
bincode = "1.3.3"
rocksdb = "0.21.0"
arkhe-db = { path = "../arkhe-db" }
libp2p = { version = "0.53", features = ["tcp", "dns", "tokio", "noise", "yamux", "gossipsub", "mdns", "macros"] }
futures = "0.3"
rand = "0.8"
zmq = "0.10"
tokio-tungstenite = "0.20"
uuid = { version = "1.0", features = ["v4", "serde"] }
statrs = "0.16"
sha3 = "0.10"
nalgebra = "0.32"
clap = { version = "4.0", features = ["derive"] }

[dev-dependencies]
rand = "0.8"
