[package]
name = "arkhen-rust"
version = "0.1.0"
edition = "2021"

[lib]
name = "arkhen_rust"
crate-type = ["cdylib", "staticlib"]

[dependencies]
sha2 = "0.10"
thiserror = "1.0"
bincode = "1.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.11", features = ["json"] }
chrono = { version = "0.4", features = ["serde"] }
anyhow = "1.0"

[profile.release]
lto = true
opt-level = 3
