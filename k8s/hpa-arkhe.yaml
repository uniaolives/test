apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: arkhe-core-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: arkhe-core
  minReplicas: 3
  maxReplicas: 100
  metrics:
  - type: External
    external:
      metric:
        name: lambda_2_average
      target:
        type: AverageValue
        averageValue: "0.95"
