apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "arkhen-retro.fullname" . }}
  labels:
    app: arkhe-bridge
    layer: temporal-core
    {{- include "arkhen-retro.labels" . | nindent 4 }}
spec:
  replicas: 3 # Quantum Redundancy / Kuramoto Consensus
  selector:
    matchLabels:
      app: arkhe-bridge
  template:
    metadata:
      labels:
        app: arkhe-bridge
        {{- include "arkhen-retro.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: arkhen-retro
          image: "arkhe-os:latest"
          ports:
            - name: rest
              container_port: 3000
              protocol: TCP
            - name: mqtt
              container_port: 1883
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: "postgres://postgres:postgres@postgres-service:5432/arkhe"
            - name: REDIS_URL
              value: "redis://redis-service:6379/"
            - name: TEMPORAL_ANCHOR_PAST
              value: "2008-01-03"
            - name: TEMPORAL_ANCHOR_FUTURE
              value: "2140-01-01"
          resources:
            limits:
              cpu: 4000m # H ≤ 1 constraint
              memory: 8Gi
            requests:
              cpu: 1000m
              memory: 2Gi
