[package]
name = "arkhe-foundry-bridge"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
anyhow = "1.0"
uuid = { version = "1.0", features = ["v4", "serde"] }
arkhe-quantum = { path = "../arkhe-quantum" }
tokio = { version = "1.0", features = ["full"] }
log = "0.4"
tonic = "0.11"
prost = "0.12"

[build-dependencies]
tonic-build = "0.11"
