[package]
name = "arkhe-foundry-bridge"
version = "0.1.0"
edition = "2021"

[dependencies]
# Standard dependencies
tokio = { version = "1.0", features = ["full"] }
futures = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
anyhow = "1.0"
tracing = "0.1"
num-complex = "0.4"
nalgebra = "0.32"
chrono = { version = "0.4", features = ["serde"] }

# External Arkhe crates
arkhe-quantum = { path = "../arkhe-quantum" }
arkhe-manifold = { path = "../arkhe-manifold" }
